        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(17, 24, 39, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.15);
            --viable: #10b981;
            --redesign: #f59e0b;
            --nogo: #ef4444;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(at 10% 20%, rgba(59, 130, 246, 0.1) 0px, transparent 50%),
                radial-gradient(at 90% 80%, rgba(16, 185, 129, 0.05) 0px, transparent 50%);
        }

        header {
            padding: 2.5rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 30%, #93c5fd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-top: 0.4rem;
        }

        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        /* FILTERS & SEARCH */
        .controls {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            padding: 1.2rem;
            border-radius: 16px;
            border: 1px solid var(--border-color);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex: 1;
            min-width: 250px;
        }

        .control-group label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        input, select {
            background: rgba(31, 41, 55, 0.5);
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s ease;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        /* GRID */
        .opportunities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: 2rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            padding: 1.8rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-6px);
            border-color: rgba(59, 130, 246, 0.3);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
        }

        .card-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: #fff;
        }

        .badge {
            padding: 0.35rem 0.75rem;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        .badge-viable {
            background: rgba(16, 185, 129, 0.1);
            color: var(--viable);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .badge-redesign {
            background: rgba(245, 158, 11, 0.1);
            color: var(--redesign);
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .badge-nogo {
            background: rgba(239, 68, 68, 0.1);
            color: var(--nogo);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        /* METRICS BAR CHART */
        .metrics {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .metric-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.8rem;
        }

        .metric-label {
            width: 140px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .metric-track {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .metric-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 1s ease-out;
        }

        .fill-primary {
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
        }

        .metric-value {
            width: 20px;
            text-align: right;
            font-weight: 600;
            color: #fff;
        }

        .avg-score {
            display: flex;
            align-items: baseline;
            gap: 0.3rem;
            background: rgba(255, 255, 255, 0.03);
            padding: 0.6rem 1rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .avg-num {
            font-size: 1.8rem;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            color: #fff;
        }

        .avg-lbl {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        /* COLLAPSIBLE DETAILS */
        .details-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.6rem;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s ease;
        }

        .details-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .details-panel {
            display: none;
            flex-direction: column;
            gap: 1rem;
            border-top: 1px solid var(--border-color);
            padding-top: 1.2rem;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .panel-sec {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .panel-sec-title {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        .bullet-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .bullet-list li {
            font-size: 0.8rem;
            color: var(--text-main);
            position: relative;
            padding-left: 1.2rem;
            line-height: 1.4;
        }

        .bullet-list li::before {
            content: "•";
            position: absolute;
            left: 0.3rem;
            color: var(--primary);
            font-weight: bold;
        }

        .bullet-list-risks li::before {
            color: var(--nogo);
        }

        .bullet-list-adjust li::before {
            color: var(--viable);
        }

        .footer {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            border-top: 1px solid var(--border-color);
            margin-top: 4rem;
        }
    </style>
</head>

        function getVerdictClass(verdict) {
            if (verdict === "VIABLE CON CORRECCIONES") return "badge-viable";
            if (verdict === "REQUIERE REDISEÑO FUNDAMENTAL") return "badge-redesign";
            return "badge-nogo";
        }

        function renderGrid(items) {
            const grid = document.getElementById("grid");
            document.getElementById("total-count").textContent = items.length;
            
            grid.innerHTML = "";
            items.forEach(item => {
                const card = document.createElement("div");
                card.className = "card";
                
                card.innerHTML = `
                    <div class="card-header">
                        <div class="card-title">${item.opportunity}</div>
                        <span class="badge ${getVerdictClass(item.verdict)}">${item.verdict}</span>
                    </div>
                    
                    <div style="display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.02); padding: 0.8rem 1.2rem; border-radius: 12px; border: 1px solid var(--border-color);">
                        <span class="avg-lbl">Puntuación Promedio</span>
                        <span class="avg-num" style="font-size: 1.4rem;">${item.promedio}</span>
                    </div>
                    
                    <div class="metrics">
                        <div class="metric-row">
                            <span class="metric-label">Resiliencia (Offline):</span>
                            <div class="metric-track">
                                <div class="metric-fill fill-primary" style="width: ${item.resiliencia * 10}%;"></div>
                            </div>
                            <span class="metric-value">${item.resiliencia}</span>
                        </div>
                        <div class="metric-row">
                            <span class="metric-label">Adapt. Gobierno:</span>
                            <div class="metric-track">
                                <div class="metric-fill fill-primary" style="width: ${item.gobierno * 10}%;"></div>
                            </div>
                            <span class="metric-value">${item.gobierno}</span>
                        </div>
                        <div class="metric-row">
                            <span class="metric-label">Escalabilidad (SaaS):</span>
                            <div class="metric-track">
                                <div class="metric-fill fill-primary" style="width: ${item.escalabilidad * 10}%;"></div>
                            </div>
                            <span class="metric-value">${item.escalabilidad}</span>
                        </div>
                        <div class="metric-row">
                            <span class="metric-label">Geopolítica (EUDR):</span>
                            <div class="metric-track">
                                <div class="metric-fill fill-primary" style="width: ${item.geopolitica * 10}%;"></div>
                            </div>
                            <span class="metric-value">${item.geopolitica}</span>
                        </div>
                        <div class="metric-row">
                            <span class="metric-label">Viabilidad Comercial:</span>
                            <div class="metric-track">
                                <div class="metric-fill fill-primary" style="width: ${item.comercial * 10}%;"></div>
                            </div>
                            <span class="metric-value">${item.comercial}</span>
                        </div>
                    </div>
                    
                    <button class="details-btn" onclick="toggleDetails(this)">
                        <span>Ver Auditoría Forense</span>
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
                    </button>
                    
                    <div class="details-panel">
                        <div class="panel-sec">
                            <span class="panel-sec-title">Detalles Fatales Detectados</span>
                            <ul class="bullet-list bullet-list-risks">
                                ${item.risks.map(r => `<li>${r}</li>`).join("")}
                            </ul>
                        </div>
                        <div class="panel-sec">
                            <span class="panel-sec-title">Ajustes Arquitectónicos de Fortificación</span>
                            <ul class="bullet-list bullet-list-adjust">
                                ${item.adjustments.map(a => `<li>${a}</li>`).join("")}
                            </ul>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function toggleDetails(btn) {
            const panel = btn.nextElementSibling;
            const svg = btn.querySelector("svg");
            if (panel.style.display === "flex") {
                panel.style.display = "none";
                svg.style.transform = "rotate(0deg)";
            } else {
                panel.style.display = "flex";
                svg.style.transform = "rotate(180deg)";
            }
        }

        function filterData() {
            const searchVal = document.getElementById("search").value.toLowerCase();
            const verdictVal = document.getElementById("filter-verdicto").value;
            const sortBy = document.getElementById("sort-by").value;
            
            let filtered = rawData.filter(item => {
                const matchesSearch = item.opportunity.toLowerCase().includes(searchVal);
                const matchesVerdict = verdictVal === "ALL" || item.verdict === verdictVal;
                return matchesSearch && matchesVerdict;
            });
            
            // Ordenar
            filtered.sort((a, b) => b[sortBy] - a[sortBy]);
            
            renderGrid(filtered);
        }

        // Carga inicial
        renderGrid(rawData);
    </script>
